server:
  port: 8080
  servlet:
    context-path: /api/ragent

spring:
  application:
    name: ragent-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: root
    password: root
    url: jdbc:mysql://127.0.0.1:3306/ragent?characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    hikari:
      connection-test-query: select 1
      connection-timeout: 20000
      idle-timeout: 300000
      maximum-pool-size: 5
      minimum-idle: 5

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456

milvus:
  uri: http://localhost:19530
  connect-timeout-ms: 3000
  rpc-deadline-ms: 8000

rag:
  default:
    collection-name: rag_default_store
    dimension: 4096
    metric-type: COSINE

  query-rewrite:
    enabled: true
    max-history-messages: 4
    max-history-chars: 500

  rate-limit:
    global:
      enabled: true
      max-concurrent: 1
      max-wait-seconds: 3
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    ttl-minutes: 60
    summary-max-chars: 200
    title-max-length: 30

  knowledge:
    chunk:
      running-stale-minutes: 10
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 2
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2
    post-processor:
      rrf-fusion:
        enabled: true
        k: 60
      quality-filter:
        enabled: true
        score-threshold: 0.3
        min-content-length: 10

  intent:
    bootstrap:
      enabled: true
      strategy: from-existing-kb
      include-system: true

  trace:
    enabled: true
    max-error-length: 1000

ai:
  providers:
    ollama:
      url: http://localhost:11434
      endpoints:
        chat: /api/chat
        embedding: /api/embed
    bailian:
      url: https://dashscope.aliyuncs.com
      api-key: ${BAILIAN_API_KEY:}
      endpoints:
        chat: /compatible-mode/v1/chat/completions
        rerank: /api/v1/services/rerank/text-rerank/text-rerank
    siliconflow:
      url: https://api.siliconflow.cn
      api-key: ${SILICONFLOW_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
        embedding: /v1/embeddings
        rerank: /v1/rerank
    minimax:
      url: https://api.minimaxi.com
      api-key: ${MINIMAX_API_KEY:}
      endpoints:
        chat: /v1/text/chatcompletion_v2

  selection:
    failure-threshold: 2
    open-duration-ms: 30000

  stream:
    message-chunk-size: 12

  chat:
    default-model: minimax-m2.5
    deep-thinking-model: minimax-m2.5
    candidates:
      - id: minimax-m2.5
        provider: minimax
        model: abab6.5s-chat
        supports-thinking: true
        priority: 1
      - id: glm-4.7
        provider: siliconflow
        model: Pro/zai-org/GLM-4.7
        supports-thinking: true
        priority: 2
      - id: qwen-plus
        provider: bailian
        model: qwen-plus-latest
        enabled: false
        priority: 3
      - id: qwen3-max
        provider: bailian
        model: qwen3-max
        supports-thinking: true
        enabled: false
        priority: 4
      - id: qwen3-local
        provider: ollama
        model: qwen3:8b-fp16
        enabled: false
        priority: 5

  embedding:
    default-model: qwen-emb-8b
    candidates:
      - id: qwen-emb-8b
        provider: siliconflow
        model: Qwen/Qwen3-Embedding-8B
        dimension: 4096
        priority: 1
      - id: qwen-emb-local
        provider: ollama
        model: qwen3-embedding:8b-fp16
        dimension: 4096
        enabled: false
        priority: 2

  rerank:
    default-model: sf-rerank
    candidates:
      - id: sf-rerank
        provider: siliconflow
        model: BAAI/bge-reranker-v2-m3
        priority: 1
      - id: sf-rerank-qwen
        provider: siliconflow
        model: Qwen/Qwen3-Reranker-8B
        priority: 2
      - id: qwen3-rerank
        provider: bailian
        model: qwen3-rerank
        enabled: false
        priority: 3
      - id: rerank-noop
        provider: noop
        model: noop
        priority: 100

rustfs:
  url: http://localhost:9000
  access-key-id: rustfsadmin
  secret-access-key: rustfsadmin

obsidian:
  enabled: true
  cli-path: /Applications/Obsidian.app/Contents/MacOS/obsidian
  vault-name: GardenOfOpeningClouds
  vault-path: /Users/openingcloud/Documents/GardenOfOpeningClouds
  timeout-seconds: 30

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false
