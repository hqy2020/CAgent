            - generic [ref=e363]:
              - paragraph [ref=e364]: Spring Bean的生命周期涉及多个阶段，从创建到销毁，每个阶段都有特定的行为和机制。以下是Spring Bean生命周期的关键要点：
              - heading "实例化阶段" [level=3] [ref=e379]
              - list [ref=e380]:
                - listitem [ref=e381]: Spring容器通过构造器、工厂方法或Supplier接口创建Bean实例。
                - listitem [ref=e382]: 优先级顺序为：Supplier函数式接口 -> 工厂方法 -> 有参构造器 -> 无参构造器。
              - heading "依赖注入阶段" [level=3] [ref=e383]
              - list [ref=e384]:
                - listitem [ref=e385]: 通过BeanDefinition的PropertyValues按名称或类型注入非注解依赖。
                - listitem [ref=e386]: 注解依赖注入通过InstantiationAwareBeanPostProcessor的postProcessProperties方法完成。
                - listitem [ref=e387]: 重要后处理器包括AutowiredAnnotationBeanPostProcessor和CommonAnnotationBeanPostProcessor，分别处理@Autowired、@Value和@Resource、@Inject、@Named。
              - heading "初始化阶段" [level=3] [ref=e388]
              - list [ref=e389]:
                - listitem [ref=e390]: 触发BeanNameAware、BeanClassLoaderAware、BeanFactoryAware等Aware接口。
                - listitem [ref=e391]: 执行BeanPostProcessor前置处理，包括@PostConstruct注解的方法和容器级Aware接口。
                - listitem [ref=e392]: 调用InitializingBean的afterPropertiesSet方法和自定义的init-method方法。
                - listitem [ref=e393]: BeanPostProcessor后置处理创建AOP代理对象。
              - heading "销毁阶段" [level=3] [ref=e394]
              - list [ref=e395]:
                - listitem [ref=e396]: 单例Bean注册销毁回调，原型Bean由使用者负责清理。
                - listitem [ref=e397]: 销毁顺序为：DestructionAwareBeanPostProcessor的destroy方法 -> DisposableBean接口的destroy方法 -> 自定义destroy-method方法。
              - heading "关键要点总结" [level=3] [ref=e398]
              - list [ref=e399]:
                - listitem [ref=e400]: Bean生命周期包括实例化、依赖注入、初始化和销毁四个阶段。
                - listitem [ref=e401]: 实例化和销毁阶段涉及Bean的创建和销毁逻辑。
                - listitem [ref=e402]: 依赖注入阶段负责设置Bean的属性值和依赖关系。
                - listitem [ref=e403]: 初始化阶段涉及Aware接口回调、初始化方法调用和AOP代理的创建。
                - listitem [ref=e404]: 销毁阶段确保Bean在不再需要时能够正确清理资源。
              - paragraph [ref=e405]: Spring通过这些生命周期阶段确保Bean的正确创建、配置、使用和销毁，同时提供了扩展点，允许开发者在不同阶段注入自定义逻辑。
