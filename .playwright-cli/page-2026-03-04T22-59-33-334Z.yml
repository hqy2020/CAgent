                    - paragraph [ref=e437]: "--- tags: - type/八股文 - domain/框架 source: \"https://open8gu.com/framework/spring/gryzqxbiwsxdpym1/\" created: 2026-02-10 板块: \"Spring\" 已刷: false --- # BeanFactory和FactoryBean有什么区别 ## 回答话术 **BeanFactory** 是Spring容器的顶级接口，负责创建、配置和管理程序中所有的Bean实例。它是整个IOC容器的核心，定义了`getBean`、`containsBean`等基本方法，最终实现类是`DefaultListableBeanFactory`。 **FactoryBean** 是一个特殊的Bean接口，实现该接口的Bean本身是一个工厂，用于创建特定类型的对象。通过beanName获取的是其产物对象，通过\"&beanName\"获取的是FactoryBean本身。 两者的核心区别： - **定位不同**：BeanFactory是Spring的IOC容器，管理所有Bean；FactoryBean是容器中的一个特殊Bean，用于创建复杂对象 - **职责不同**：BeanFactory负责Bean的完整生命周期管理；FactoryBean只负责创建特定对象 - **层级不同**：BeanFactory是基础设施级别的接口；FactoryBean是应用级别的接口 - **使用场景不同**：BeanFactory是框架内部使用；FactoryBean用于第三方框架集成（如Mybatis的MapperFactoryBean、Dubbo的ReferenceBean） ## 问题详解 ### BeanFactory - Spring容器的顶级接口，IOC容器的核心 - 管理Bean的注册、实例化、初始化、依赖注入及销毁 - 接口体系：ListableBeanFactory、HierarchicalBeanFactory、AutowireCapableBeanFactory、ConfigurableBeanFactory、ConfigurableListableBeanFactory - 最终实现类：`DefaultListableBeanFactory` - 包含三级缓存机制解决循环依赖 ### FactoryBean - 特殊的Bean接口，实现者是创建特定对象的工厂 - 三个核心方法：`getObject()`、`getObjectType()`、`isSingleton()` - 通过beanName获得产物，通过\"&beanName\"获得工厂本身 - Spring仅管理FactoryBean自身的生命周期，不完整管理产物的生命周期 - 典型使用：Mybatis的MapperFactoryBean、Dubbo的ReferenceBean、SqlSessionFactoryBean ### 对比总结 | 维度 | BeanFactory | FactoryBean | |------|-------------|-------------| | 定位 | Spring IOC容器 | 容器中的特殊Bean | | 职责 | 管理所有Bean的生命周期 | 创建特定类型的对象 | | 接口方法 | getBean、containsBean等 | getObject、getObjectType、isSingleton | | 使用者 | Spring框架内部 | 第三方框架集成 | | 实现类 | DefaultListableBeanFactory | MapperFactoryBean、ReferenceBean等 | ## 关键要点 - BeanFactory是容器，FactoryBean是容器中的特殊Bean，两者名字相似但职责完全不同 - BeanFactory管理所有Bean的完整生命周期，FactoryBean仅负责创建特定对象 - FactoryBean的典型应用场景是创建代理对象或复杂初始化的对象 - 面试时注意区分两个概念，不要混淆"
