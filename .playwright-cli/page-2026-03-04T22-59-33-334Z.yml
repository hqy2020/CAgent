                    - paragraph [ref=e450]: "--- tags: - type/八股文 - domain/框架 source: \"https://open8gu.com/framework/spring/kemtzwgchc3r1dbs/\" created: 2026-02-10 板块: \"Spring\" 已刷: false --- # Spring有哪些常用注解 ## 回答话术 Spring常用注解主要分为以下几类：Bean配置注解、事务注解和事件注解。 **Bean配置注解**包括：`@Component`用于标记类为Bean；`@Configuration`和`@Bean`用于声明配置类和工厂方法；`@Scope`指定作用域；`@Lazy`实现懒加载；`@Order`和`@Priority`指定执行顺序；`@Primary`设置优先注入；`@DependsOn`指定加载依赖顺序；`@PostConstruct`和`@PreDestroy`管理生命周期。 **事务注解**：`@Transactional`开启事务，所有操作要么全部成功，要么全部回滚。 **事件注解**：`@EventListener`注册事件监听器；`@TransactionalEventListener`仅在事务特定阶段响应事件。 ## 问题详解 ### 一、Bean配置注解 #### 1. @Component 用于标记类为Spring Bean。支持指定beanName，未指定时默认使用小写开头的短类名。 ```java @Component(\"foo\") public class Foo { } ``` #### 2. @ManagedBean 和 @Named JSR330规范的注解。`@Named`等价于`@Component`，`@ManagedBean`等价于无法指定beanName的`@Component`。 ```java @Named(\"a\") public class A {} @ManagedBean public class B {} ``` #### 3. @Configuration 和 @Bean `@Configuration`声明配置类，其内的`@Bean`方法返回的对象作为Bean。 ```java @Configuration public class ExampleConfiguration { @Bean(\"foo\") public Foo foo() { return new Foo(); } } ``` `@Bean`属性： - value/name：指定beanName及别名 - autowireCandidate：是否需要依赖注入 - initMethod/destroyMethod：初始化和销毁方法名称 #### 4. @Lookup 将方法变为从Spring容器获取特定类型Bean的工厂方法。 ```java @Component public class Instance { } @Component public class InstanceFactory { @Lookup public Instance get() { return null; } } ``` #### 5. @Scope 指定Bean的作用域。支持的作用域：singleton（单例，默认）、prototype（原型）、request、session、application（Web环境）。 ```java @Scope(\"prototype\") @Component public class Foo { } ``` #### 6. @Lazy 实现懒加载和延迟注入。可用于类、方法或注入属性。 ```java @Lazy @Component public class Foo { } ``` #### 7. @Order 和 @Priority 指定Bean的执行顺序（值越小越靠前）。"
