                    - paragraph [ref=e398]: "--- tags: - type/八股文 - domain/框架 source: \"https://open8gu.com/framework/spring/dhzlrik2ylop354g/\" created: 2026-02-10 板块: \"Spring\" 已刷: false --- # 什么是FactoryBean ## 回答话术 `FactoryBean`是Spring中的一个特殊接口，实现该接口的Bean专门用来创建特定类型对象的工厂。 主要应用场景：无法通过正常构造函数创建的对象（如各种代理）和创建过程复杂的对象（如SqlSession）。 三个核心方法：`getObject`获取实例、`getObjectType`获取实例类型、`isSingleton`判断是否单例。 获取方式：通过beanName获得产物对象，通过\"&beanName\"获得FactoryBean本身。 ## 问题详解 ### beanName机制 ```java @Component(\"foo\") public static class FooFactoryBean implements FactoryBean<Foo> { @Override public Foo getObject() throws Exception { return new Foo(); } @Override public Class<?> getObjectType() { return Foo.class; } public static class Foo {} } @Component public class Example { @Autowired private ApplicationContext context; public void run() { // 通过 'foo' 获得产物 Foo Foo foo = (Foo)context.getBean(\"foo\"); // 通过 '&foo' 获得 FooFactoryBean FactoryBean<Foo> factory = (FactoryBean<Foo>)context.getBean(\"&foo\"); } } ``` ### 生命周期 Spring仅管理FactoryBean的生命周期，不管理产物的生命周期。 - **FactoryBean本身**：支持所有后处理器和回调接口 - **产物**：仅支持`BeanPostProcessor`的`postProcessAfterInitialization`方法 由于缺少前置步骤，`@Autowired`等注解在产物Bean上无法生效。但`@Async`和`MethodValidationPostProcessor`可以生效。 ### 作用域 - FactoryBean的作用域通过`@Scope`配置 - 产物的作用域通过`isSingleton()`方法控制 - 覆盖原则：若FactoryBean设为多例，即使`isSingleton()`返回true，产物也为多例 ### 产物的加载时机 产物Bean默认延迟加载，仅在被获取或依赖注入时触发。 提前初始化条件： 1. 实现`SmartFactoryBean`接口并重写`isEagerInit()`返回true 2. `getObjectType()`返回null时，调用`getType`或`isTypeMatch`方法会触发产物创建 ### 使用场景 - **创建代理对象**：Dubbo的`ReferenceBean`（RPC接口代理）、Mybatis的`MapperFactoryBean`（Mapper接口代理） - **创建复杂对象**：`SqlSessionFactoryBean`（创建SqlSession） 核心优势：无需目标类提供公开构造方法，产物不受Spring管理避免依赖冲突，是第三方框架集成的切入点。 ## 关键要点 - `FactoryBean`的beanName对应产物，\"&beanName\"对应工厂本身 - Spring只管理FactoryBean的完整生命周期，产物仅经过`postProcessAfterInitialization` - FactoryBean为多例时，产物必然也是多例（覆盖`isSingleton`的设置） - 产物默认延迟加载，仅在被使用时才触发创建 - 当倾向于使用工厂方法而非构造方法创建Bean时，可考虑使用FactoryBean"
