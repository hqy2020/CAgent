                                        - paragraph: "--- tags: - type/八股文 - domain/框架 source: \"https://open8gu.com/framework/spring/cssibafmgio4g44c/\" created: 2026-02-10 板块: \"Spring\" 已刷: false --- # Bean的生命周期 ## 回答话术 Bean的生命周期分为四个阶段： **1. 实例化阶段**：Spring通过推断Bean类型，采用Supplier接口、工厂方法或构造器三种方式之一创建实例。构造器注入也在此阶段完成。 **2. 依赖注入阶段**：在三级缓存设置ObjectFactory处理循环依赖，使用MergedBeanDefinitionPostProcessor解析依赖注入元数据，先完成非注解式依赖注入，再通过InstantiationAwareBeanPostProcessor按注解配置进行注入。 **3. 初始化阶段**：触发BeanNameAware等基础Aware接口，执行BeanPostProcessor前置处理（包括@PostConstruct），触发容器级Aware接口（如ApplicationContextAware），调用InitializingBean和自定义init-method，执行BeanPostProcessor后置处理（创建AOP代理对象）。 **4. 销毁阶段**：通过DisposableBeanAdapter依次调用DestructionAwareBeanPostProcessor、DisposableBean接口的destroy方法、自定义destroy-method。 ## 问题详解 ### 核心源码入口 ```java protected Object doCreateBean(String beanName, RootBeanDefinition mbd, Object[] args) { // 实例化 BeanWrapper instanceWrapper = createBeanInstance(beanName, mbd, args); // 合并BeanDefinition applyMergedBeanDefinitionPostProcessors(mbd, beanType, beanName); // 三级缓存设置ObjectFactory addSingletonFactory(beanName, () -> getEarlyBeanReference(beanName, mbd, bean)); // 依赖注入 populateBean(beanName, mbd, instanceWrapper); // 初始化 exposedObject = initializeBean(beanName, exposedObject, mbd); // 注册销毁回调 registerDisposableBeanIfNecessary(beanName, bean, mbd); } ``` ### 1. 实例化阶段 优先选择顺序：Supplier函数式接口 -> 工厂方法 -> 有参构造器 -> 无参构造器。 ### 2. 依赖注入阶段 两类注入方式： - **非注解注入**：通过BeanDefinition的PropertyValues按名称或类型注入 - **注解注入**：通过InstantiationAwareBeanPostProcessor的postProcessProperties方法完成 重要后处理器： - `AutowiredAnnotationBeanPostProcessor`：处理@Autowired与@Value - `CommonAnnotationBeanPostProcessor`：处理@Resource、@Inject、@Named ### 3. 初始化阶段"
