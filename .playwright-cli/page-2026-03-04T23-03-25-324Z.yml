            - generic [ref=e338]:
              - paragraph [ref=e339]: Spring Bean的生命周期分为四个主要阶段：
              - heading "1. 实例化阶段" [level=3] [ref=e340]
              - paragraph [ref=e341]: Spring通过推断Bean类型，采用Supplier接口、工厂方法或构造器三种方式之一创建实例。构造器注入也在此阶段完成。
              - heading "2. 依赖注入阶段" [level=3] [ref=e342]
              - paragraph [ref=e343]: 在三级缓存设置ObjectFactory处理循环依赖，使用MergedBeanDefinitionPostProcessor解析依赖注入元数据，先完成非注解式依赖注入，再通过InstantiationAwareBeanPostProcessor按注解配置进行注入。
              - heading "3. 初始化阶段" [level=3] [ref=e344]
              - paragraph [ref=e345]: 触发BeanNameAware等基础Aware接口，执行BeanPostProcessor前置处理（包括@PostConstruct），触发容器级Aware接口（如ApplicationContextAware），调用InitializingBean和自定义init-method，执行BeanPostProcessor后置处理（创建AOP代理对象）。
              - heading "4. 销毁阶段" [level=3] [ref=e346]
              - paragraph [ref=e347]: 通过DisposableBeanAdapter依次调用DestructionAwareBeanPostProcessor、DisposableBean接口的destroy方法、自定义destroy-method。
              - paragraph [ref=e348]: 以上就是Spring Bean的生命周期的四个阶段。
