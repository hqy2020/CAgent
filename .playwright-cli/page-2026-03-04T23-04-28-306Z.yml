                    - generic [ref=e516]:
                      - paragraph [ref=e517]: "--- tags: - type/八股文 - domain/框架 source: \"https://open8gu.com/framework/spring/czah4zwbmyng0qp7/\" created: 2026-02-10 板块: \"Spring\" 已刷: false --- # 什么是BeanFactory ## 回答话术 `BeanFactory`是Spring中用于管理Bean生命周期的核心组件，Spring官方文档将其称为IOC容器，是\"Spring容器\"的实现。 `BeanFactory`是最顶级的接口，定义了获取和创建Bean的基本方法，下面细分五个接口： - **ListableBeanFactory**：扩展批量操作能力，如`getBeansOfType`方法 - **HierarchicalBeanFactory**：支持层次性结构，实现父子关系 - **AutowireCapableBeanFactory**：提供自动装配支持 - **ConfigurableBeanFactory**：提供Scope管理、类加载器等配置 - **ConfigurableListableBeanFactory**：集全部接口之大成者 最底层实现类是`DefaultListableBeanFactory`，直接或间接实现所有接口，是项目中最常用的实现类。 ## 问题详解 ### BeanFactory接口体系 分为三个层级，五大接口： **第一层**：`BeanFactory`本身，定义针对单个Bean的基本访问和创建方法。 **第二层**：基于`BeanFactory`直接扩展 - `ListableBeanFactory`：批量操作 - `HierarchicalBeanFactory`：父子层级 - `AutowireCapableBeanFactory`：自动装配 **第三层**：进一步扩展 - `ConfigurableBeanFactory`：继承`HierarchicalBeanFactory`和`SingletonBeanRegistry` - `ConfigurableListableBeanFactory`：继承`ConfigurableBeanFactory`和`ListableBeanFactory` ### SingletonBeanRegistry 表示单例Bean的注册表，分两层： - **DefaultSingletonBeanRegistry**：包含三级缓存机制，处理单例Bean销毁 - **FactoryBeanRegistrySupport**：基于前者扩展，为`FactoryBean`提供支持，有`factoryBeanObjectCache` ### BeanDefinitionRegistry 用于注册和管理Bean定义（`BeanDefinition`）。`BeanDefinition`是Bean的元数据，描述属性、方法、依赖和创建方式。 `DefaultListableBeanFactory`和`GenericApplicationContext`都实现了此接口。 ## 关键要点 - `BeanFactory`是Spring IOC容器的核心接口，管理Bean的完整生命周期 - `DefaultListableBeanFactory`是最终实现类，Spring中所有BeanFactory都使用它 - 三级缓存机制在`DefaultSingletonBeanRegistry`中实现，用于解决循环依赖 - `BeanDefinition`是Bean的元数据描述，`BeanDefinitionRegistry`负责管理这些元数据 - 推荐使用`ApplicationContext`（它内部包含`DefaultListableBeanFactory`）而非直接使用BeanFactory"
