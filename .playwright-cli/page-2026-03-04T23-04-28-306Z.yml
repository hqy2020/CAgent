                      - paragraph [ref=e452]: "# Spring八股文核心脉络 > 面试速查 | 掌握这条主线，所有题目都是变种 ## 主线脉络（一句话串联） IOC/DI → Bean生命周期 → 三级缓存(循环依赖) → AOP → 事务 → 常用注解 → SpringBoot自动装配 ## 知识图谱（面试考频排序） | 优先级 | 主题 | 核心一句话 | 关联题目 | |--------|------|----------|----------| | L1 必问 | IOC/DI | 控制反转=容器管Bean，依赖注入=容器塞依赖 | [[IOC与DI]] | | L1 必问 | Bean生命周期 | 实例化→属性赋值→初始化→使用→销毁，14步 | [[Bean生命周期]] | | L1 必问 | 三级缓存 | 一级成品/二级半成品/三级Factory，解决循环依赖 | [[三级缓存解决循环依赖]] | | L1 必问 | AOP | 切面=切点+通知，JDK代理接口/CGLib代理类 | [[AOP原理]] | | L2 高频 | 事务 | @Transactional声明式，传播行为7种，失效场景 | [[Spring事务]] | | L2 高频 | @Autowired vs @Resource | Autowired按类型(Spring)，Resource按名称(JDK) | [[@Autowired vs @Resource]] | | L2 高频 | 自动装配 | @EnableAutoConfiguration→spring.factories→条件装配 | [[SpringBoot自动装配原理]] | | L2 高频 | Bean作用域 | singleton(默认)/prototype/request/session | [[Bean作用域]] | | L3 加分 | SpringBoot启动流程 | run()→创建Context→加载配置→扫描→实例化→注入→就绪 | [[SpringBoot启动流程]] | | L3 加分 | 循环依赖限制 | 构造器注入和多例Bean无法解决循环依赖 | [[循环依赖限制]] | ## 面试串讲脚本（3分钟版） Spring的核心是IOC和AOP。IOC通过容器管理Bean的创建和依赖注入，本质是工厂模式+反射。Bean生命周期14步，关键节点是实例化、属性赋值、初始化。 循环依赖通过三级缓存解决：一级存成品Bean，二级存半成品，三级存BeanFactory。但构造器注入和多例Bean无法解决。 AOP基于动态代理，有接口用JDK代理，无接口用CGLib。事务用@Transactional，底层就是AOP，注意自调用失效问题。 SpringBoot自动装配靠@EnableAutoConfiguration加载spring.factories中的配置类，配合@Conditional条件装配。 --- > 整理自语雀八股文Spring部分 --- ## 一、IOC与DI ### 1.1 IOC（控制反转） **定义**：对象的创建控制权从程序转移到Spring容器 **本质**：工厂模式 + 反射 + 配置文件 ### 1.2 DI（依赖注入） **注入方式**： | 方式 | 说明 | |------|------| | 构造器注入 | 推荐，final保证 | | setter注入 | 可选注入 | | 字段注入 | 不推荐（反射，违反封装） | ### 1.3 常用注解 **bean定义**： - `@Component`：通用 - `@Service`：业务层 - `@Repository`：持久层 - `@Controller`：控制器 **注入**： - `@Autowired`：按类型注入 - `@Resource`：按名称注入 - `@Qualifier`：指定名称 --- ## 二、Bean生命周期 ### 完整流程（14步）"
