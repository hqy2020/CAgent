          - paragraph [ref=e548]: Bean的生命周期分为四个阶段：
          - paragraph [ref=e549]:
            - strong [ref=e550]: 1. 实例化阶段
            - text: ：Spring通过推断Bean类型，采用Supplier接口、工厂方法或构造器三种方式之一创建实例。构造器注入也在此阶段完成。
          - paragraph [ref=e551]:
            - strong [ref=e552]: 2. 依赖注入阶段
            - text: ：在三级缓存设置ObjectFactory处理循环依赖，使用MergedBeanDefinitionPostProcessor解析依赖注入元数据，先完成非注解式依赖注入，再通过InstantiationAwareBeanPostProcessor按注解配置进行注入。
          - paragraph [ref=e553]:
            - strong [ref=e554]: 3. 初始化阶段
            - text: ：触发BeanNameAware等基础Aware接口，执行BeanPostProcessor前置处理（包括@PostConstruct），触发容器级Aware接口（如ApplicationContextAware），调用InitializingBean和自定义init-method，执行BeanPostProcessor后置处理（创建AOP代理对象）。
          - paragraph [ref=e555]:
            - strong [ref=e556]: 4. 销毁阶段
            - text: ：通过DisposableBeanAdapter依次调用DestructionAwareBeanPostProcessor、DisposableBean接口的destroy方法、自定义destroy-method。
          - heading "问题详解" [level=2] [ref=e557]
