                                      - generic:
                                        - paragraph: "--- tags: - type/八股文 - domain/框架 source: \"https://open8gu.com/framework/spring/op4x4xls20ilw8r5/\" created: 2026-02-10 板块: \"Spring\" 已刷: false --- # Bean的作用域是什么有哪些作用域 ## 回答话术 作用域即Bean的Scope，表示被Spring容器管理的Bean的生命周期范围。 **Spring默认支持两种作用域：** - **singleton（单例）**：默认作用域，容器中只有一个实例 - **prototype（原型/多例）**：每次获取都创建新实例 **SpringWeb中支持三种额外作用域：** - **request**：一次HTTP请求内有效 - **session**：一次浏览器Session内有效 - **application**：全局有效 **SpringCloud中支持：** - **refresh**：配置刷新时销毁Bean重新创建 ## 问题详解 ### 如何使用 ```java @Scope(\"singleton\") @Component public class Foo { @Scope(\"prototype\") @Bean public Foo2 foo2() { return new Foo2(); } } ``` ### 作用域与依赖注入 指定非单例作用域又使用依赖注入时需要注意： ```java @Component public class Example { @Autowired private Foo foo; // 除非Example被重新初始化，否则注入的foo不会变 } ``` 如需实现多例效果，可配合`@Lookup`或直接从容器获取： ```java public class Example { @Autowired private ApplicationContext context; public void run() { // 每次获取不同实例 Assert.isNotSame(context.getBean(Foo.class), context.getBean(Foo.class)); } } ``` ### 如何注册自定义作用域 ```java @Component public class Example { @Autowired private ApplicationContext context; public void run() { ConfigurableBeanFactory cbf = (ConfigurableBeanFactory)context.getBeanFactory(); cbf.registerScope(\"thread\", new SimpleThreadScope()); } } ``` 或声明为Bean自动注册： ```java @Configuration public class ScopeConfig { @Bean(\"thread\") public SimpleThreadScope simpleThreadScope() { return new SimpleThreadScope(); } } ``` ## 关键要点 - Spring默认两种作用域：singleton和prototype；Web环境额外支持request、session、application - 单例是默认作用域，容器中只有一个实例 - 多例Bean通过依赖注入后不会自动更新，需要配合@Lookup或手动从容器获取 - SpringCloud的refresh作用域在配置刷新时销毁并重新创建Bean - 可通过`registerScope`方法注册自定义作用域"
